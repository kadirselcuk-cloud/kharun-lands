<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kharun Lands — Browser RPG</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast"></div>
  <!-- ?v= cache-busts these three on every deploy — without it, a host/
       browser with no-explicit-cache-header heuristic caching (or a CDN)
       can silently keep serving an old game.js/ui.js/data.js after a
       balance or skill-system change ships, which looks exactly like a
       gameplay bug (e.g. a "removed" skill still showing) but is actually
       just stale JS. Bump this string whenever you deploy. -->
  <script src="data.js?v=1.4.3"></script>
  <script src="game.js?v=1.4.3"></script>
  <script src="ui.js?v=1.4.3"></script>
</body>
</html>
